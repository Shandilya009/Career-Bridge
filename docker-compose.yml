version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:7.0
    container_name: careerbridge-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=CareerBridgeDb
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - careerbridge-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: careerbridge-backend
    restart: unless-stopped
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT:-Development}
      - ASPNETCORE_URLS=${ASPNETCORE_URLS:-http://+:8080}
      - MongoDbSettings__ConnectionString=${MONGODB_CONNECTION_STRING:-mongodb://mongodb:27017}
      - MongoDbSettings__DatabaseName=${MONGODB_DATABASE_NAME:-CareerBridgeDb}
      - JwtSettings__SecretKey=${JWT_SECRET:-super_secret_career_bridge_key_must_be_long_1234567890}
      - JwtSettings__ExpirationInMinutes=${JWT_EXPIRY_MINUTES:-60}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - careerbridge-network
    volumes:
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # Frontend (React + Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:5001/api}
    container_name: careerbridge-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - careerbridge-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  careerbridge-network:
    driver: bridge
    name: careerbridge-network

volumes:
  mongodb_data:
    name: careerbridge_mongodb_data
  mongodb_config:
    name: careerbridge_mongodb_config
  backend_uploads:
    name: careerbridge_backend_uploads
  backend_logs:
    name: careerbridge_backend_logs
